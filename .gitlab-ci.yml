stages:
  - report
  - process
  - commit
  - test
  - email

variables:
  PYTHON_IMAGE: registry.cern.ch/docker.io/library/python:3.13-slim-bullseye

.rules:
  daily:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_PIPELINE_TIMING == "daily"
  weekly:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_PIPELINE_TIMING == "weekly"
  merge_request:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# create and commit all reports only on daily schedule
grid:
  stage: report
  tags:
    - eos
  before_script:
    - yum install -y python3-pip
    - pip3 install pandas
    - echo "${PASSWORD}" | kinit $USERNAME
  script:
    - python3 gridspace.py --rse $DISK
  parallel:
    matrix:
      - DISK: [CERN-PROD_PHYS-EXOTICS, TOKYO-LCG2_PHYS-EXOTICS]
  artifacts:
    paths:
      - ./reports/$DISK.csv
    expire_in: 24h
  retry: 1 # sometimes there are issues e.g. when pulling docker image
  rules: !reference [.rules, daily]
  allow_failure: True

grid_test:
  extends: grid
  stage: test
  parallel:
    matrix:
      - DISK: [TOKYO-LCG2_PHYS-EXOTICS]
  rules: !reference [.rules, merge_request]

eos:
  stage: report
  tags:
    - eos
  before_script:
    - yum install -y python3-pip
    - pip3 install python-gitlab
    - echo "${PASSWORD}" | kinit $USERNAME
  script:
    - python3 eos.py -s $SUBGROUP --report-in-gitlab
  parallel:
    matrix:
      - SUBGROUP: [ccs, cdm, hqt, jdm, jmx, lpx, lup, ueh]
  artifacts:
    paths:
      - ./reports/$SUBGROUP.csv
    expire_in: 24h
  retry: 1 # sometimes there are issues e.g. when pulling docker image
  rules: !reference [.rules, daily]

eos_test:
  extends: eos
  stage: test
  parallel:
    matrix:
      - SUBGROUP: [cdm]
  rules: !reference [.rules, merge_request]

csv_to_twiki:
  stage: process
  image: $PYTHON_IMAGE
  script:
    - python3 helpers/csv_to_twiki.py --file reports/$NAME.csv --delimiter , --highlight-header
  parallel:
    matrix:
      - NAME: [CERN-PROD_PHYS-EXOTICS, TOKYO-LCG2_PHYS-EXOTICS, ccs, cdm, hqt, jdm, jmx, lpx, lup, ueh]
  artifacts:
    paths:
      - ./reports/$NAME.table
    expire_in: 24h
  rules: !reference [.rules, daily]

csv_to_twiki_lookup:
  stage: process
  image: $PYTHON_IMAGE
  script:
    - python3 helpers/csv_to_twiki.py --file lookup_table.csv
  artifacts:
    paths:
      - ./reports/lookup_table.table
    expire_in: 24h
  rules: !reference [.rules, daily]

plot:
  stage: process
  image: $PYTHON_IMAGE
  before_script:
    - apt update
    - apt install -y git
    - pip3 install --upgrade pip
    - pip3 install matplotlib
  script:
    - python3 plots.py
  artifacts:
    paths:
      - ./reports/*.pdf
    expire_in: 24h
  retry: 1 # sometimes there are issues e.g. when pulling docker image
  rules: !reference [.rules, daily]
  allow_failure: True

commit:
  stage: commit
  script:
    - git config user.email "exotics.diskspace.watcher@cern.ch"
    - git config user.name "ExoticsDiskspaceWatcher"
    - git remote add gitlab_origin https://oauth2:$ACCESS_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git
    - git add reports/*.csv
    - git add reports/*.table
    # - git add reports/*.pdf
    # commit and push only if changes present
    # https://stackoverflow.com/questions/22040113/how-to-let-jenkins-git-commit-only-if-there-are-changes
    - git diff --staged --quiet || (git commit -m "update subgroup data (`date +'%Y-%m-%d'`)" && git push -o ci.skip gitlab_origin HEAD:main)
  rules: !reference [.rules, daily]

email:
  stage: email
  image: $PYTHON_IMAGE
  before_script:
    - apt update
    - apt install -y git
    - apt install -y texlive-latex-base texlive-latex-extra
  script:
    - python3 send_weekly_report.py
  artifacts:
    paths:
      - latex.pdf
    expire_in: 28d
  rules: !reference [.rules, weekly]
